name: 自动获取 GitHub 节点订阅链接
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖 requests（修复报错）
        run: pip install requests

      - name: 运行抓取脚本
        run: python main.py

      - name: 提交并推送更新
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "auto update sources"
          git push
